name: Build Media Shield

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Media Shield
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build Media Shield
        run: npm run build

      - name: Prepare Chrome extension
        run: |
          mkdir -p chrome-build

          cp -R dist/. chrome-build/

          cp manifest.json chrome-build/manifest.json

          if [ -f metadata.js ]; then
            cp metadata.js chrome-build/metadata.js
          fi

          echo "=== CHROME EXTENSION CONTENTS ==="
          find chrome-build -type f -print

      - name: Verify required Chrome files
        run: |
          test -f chrome-build/manifest.json
          test -f chrome-build/popup.html
          test -f chrome-build/analysis.html
          test -f chrome-build/assets/provenance.js

          echo "Media Shield Chrome package verification passed."

      - name: Upload Chrome extension
        uses: actions/upload-artifact@v4
        with:
          name: media-shield-chrome
          path: chrome-build/
          if-no-files-found: error
